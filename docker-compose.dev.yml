# Dev overlay: Xdebug в notification-php.
#
# Запуск:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build php nginx
#
# Отладка по HTTP (trigger — только при XDEBUG_TRIGGER=1 или расширении браузера):
#   curl "http://localhost:8080/?XDEBUG_TRIGGER=1"
#
# Переменные (опционально в .env):
#   XDEBUG_MODE=debug
#   XDEBUG_CONFIG=client_host=host.docker.internal client_port=9003 start_with_request=trigger
#   PHP_IDE_CONFIG=serverName=notification-service

services:
  php:
    build:
      dockerfile: docker/php/Dockerfile.dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      XDEBUG_CONFIG: ${XDEBUG_CONFIG:-client_host=host.docker.internal}
      PHP_IDE_CONFIG: ${PHP_IDE_CONFIG:-serverName=notification-service}
