services:
  nginx:
    image: nginx:1.27-alpine
    container_name: notification-nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_started

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: notification-php
    volumes:
      - ./:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  worker-critical:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: notification-worker-critical
    entrypoint: ["docker-worker-entrypoint.sh"]
    command: php artisan rabbitmq:consume rabbitmq --queue=notifications-critical --sleep=1 --tries=5 --timeout=120
    volumes:
      - ./:/var/www/html
    environment: &worker_env
      RUN_MIGRATIONS: "false"
    depends_on: &worker_depends
      php:
        condition: service_started
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started

  worker-normal:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: notification-worker-normal
    entrypoint: ["docker-worker-entrypoint.sh"]
    command: php artisan rabbitmq:consume rabbitmq --queue=notifications-normal --sleep=1 --tries=5 --timeout=120
    volumes:
      - ./:/var/www/html
    environment: *worker_env
    depends_on: *worker_depends

  postgres:
    image: postgres:16-alpine
    container_name: notification-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE:-notifications}
      POSTGRES_USER: ${DB_USERNAME:-notifications}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-notifications} -d ${DB_DATABASE:-notifications}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: notification-rabbitmq
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
      - "${RABBITMQ_PORT:-5672}:5672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: notification-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
